<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoBrickogniser</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">

      <section class="camera-panel">
        <div class="capture-grid">
          <div class="capture-column">
            <div class="media-frame media-with-action" id="liveFrame">
              <video id="video" autoplay playsinline></video>
              <button id="analyzeBtn" class="analyze-icon-btn" type="button" disabled aria-label="Analyze current frame" title="Analyze current frame">
                Analyse
              </button>
            </div>
          </div>

          <div class="capture-column">
            <div class="media-frame" id="referenceFrame">
              <img id="referenceImage" class="reference-image" alt="Detected BrickLink piece" hidden />
              <div id="referencePlaceholder" class="reference-placeholder">
                <span>No detected piece yet.</span>
              </div>
              <button id="referenceOpenBtn" class="analyze-icon-btn reference-open-btn" type="button" hidden aria-label="Open BrickLink reference" title="Open BrickLink reference">Open</button>
            </div>
          </div>
        </div>

        <canvas id="canvas" hidden></canvas>
      </section>

      <section class="result-panel">
        <div class="panel-heading">
          <div id="status" class="status">Start camera to begin.</div>
        </div>
        <div id="result"></div>
      </section>

      <section class="result-panel">
        <div class="panel-heading">
          <h2>Debug Diagnostics</h2>
          <button id="debugToggleBtn" class="toggle-btn" type="button" aria-expanded="true">Hide details</button>
        </div>
        <p class="subtitle">Raw response returned from Brickognize for the latest analysis request.</p>
        <div id="debugWrapper" class="debug-wrapper">
          <pre id="debugPanel" class="debug-panel">No analysis run yet.</pre>
        </div>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
